#      YANDEX_API_TOKEN: ${YANDEX_API_TOKEN:-}
#      YANDEX_DISK_PATH: ${YANDEX_DISK_PATH:-Приложения/Tilda Publishing and Disk/English_test/}
#    volumes:
#      - downloads:/data/downloads
#    depends_on:
#      mongo:
#        condition: service_healthy

  mongo:
    image: mongo:8
    restart: unless-stopped
    command: [ "mongod", "--logpath", "/proc/1/fd/1", "--logappend", "--quiet", "--setParameter", "logComponentVerbosity={verbosity:0}" ]
    volumes:
      - mongo-data:/data/db
    #    ports:
    #      - "27017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  caddy-data:
  caddy-config:
  mongo-data:
  downloads:
