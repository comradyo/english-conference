  web:
    image: ${COMPOSE_PROJECT_NAME}-web:${API_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-eng_conference}
      WEB_USERS_COLLECTION: ${WEB_USERS_COLLECTION:-web_users}
      WEB_REGISTRATIONS_COLLECTION: ${WEB_REGISTRATIONS_COLLECTION:-conference_registrations}
      WEB_EMAIL_TASKS_COLLECTION: ${WEB_EMAIL_TASKS_COLLECTION:-email_tasks}
      WEB_PASSWORD_RESET_TOKENS_COLLECTION: ${WEB_PASSWORD_RESET_TOKENS_COLLECTION:-password_reset_tokens}
      WEB_SESSIONS_COLLECTION: ${WEB_SESSIONS_COLLECTION:-web_sessions}
      WEB_SESSION_COOKIE_NAME: ${WEB_SESSION_COOKIE_NAME:-conference_session}
      WEB_SESSION_TTL_HOURS: ${WEB_SESSION_TTL_HOURS:-168}
      WEB_PASSWORD_RESET_TTL_MINUTES: ${WEB_PASSWORD_RESET_TTL_MINUTES:-30}
      WEB_CHECKER_API_URL: ${WEB_CHECKER_API_URL:-http://checker-api:8000/validate}
      WEB_CHECKER_API_TIMEOUT_SEC: ${WEB_CHECKER_API_TIMEOUT_SEC:-30}
      WEB_ADMIN_EMAILS: ${WEB_ADMIN_EMAILS:-}
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/ready || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
#    ports:
#      - "80:8000"
    depends_on:
      mongo:
        condition: service_healthy
      checker-api:
        condition: service_started

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  mailer:
    image: ${COMPOSE_PROJECT_NAME}-mailer:${API_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/mailer.Dockerfile
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-eng_conference}
      WEB_EMAIL_TASKS_COLLECTION: ${WEB_EMAIL_TASKS_COLLECTION:-email_tasks}
      WEB_NOTIFICATION_EMAIL_SENDER: ${WEB_NOTIFICATION_EMAIL_SENDER}
      WEB_NOTIFICATION_EMAIL_PASSWORD: ${WEB_NOTIFICATION_EMAIL_PASSWORD}
      WEB_NOTIFICATION_EMAIL_SMTP_HOST: ${WEB_NOTIFICATION_EMAIL_SMTP_HOST}
      WEB_NOTIFICATION_EMAIL_SMTP_PORT: ${WEB_NOTIFICATION_EMAIL_SMTP_PORT}
      WEB_NOTIFICATION_EMAIL_USE_SSL: ${WEB_NOTIFICATION_EMAIL_USE_SSL}
      MAILER_POLL_INTERVAL_SEC: ${MAILER_POLL_INTERVAL_SEC:-5}
      MAILER_RETRY_DELAY_SEC: ${MAILER_RETRY_DELAY_SEC:-60}
      MAILER_MAX_ATTEMPTS: ${MAILER_MAX_ATTEMPTS:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mongo:
        condition: service_healthy

  checker:
    image: ${COMPOSE_PROJECT_NAME}-checker:${API_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/checker.Dockerfile
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-eng_conference}
      WEB_REGISTRATIONS_COLLECTION: ${WEB_REGISTRATIONS_COLLECTION:-conference_registrations}
      CHECKER_POLL_INTERVAL_SEC: ${CHECKER_POLL_INTERVAL_SEC:-5}
      CHECKER_PROCESSING_TIMEOUT_SEC: ${CHECKER_PROCESSING_TIMEOUT_SEC:-300}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mongo:
        condition: service_healthy

  checker-api:
    image: ${COMPOSE_PROJECT_NAME}-checker:${API_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/checker.Dockerfile
    restart: unless-stopped
    command: ["uvicorn", "main:api_app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}

#  worker:
#    image: ${COMPOSE_PROJECT_NAME}-worker:${API_IMAGE_TAG:-latest}
