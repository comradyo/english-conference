name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            context: .
            file: ./docker/web.Dockerfile
            image: artluz/eng-conference-web

          - name: mailer
            context: .
            file: ./docker/mailer.Dockerfile
            image: artluz/eng-conference-mailer

          - name: checker
            context: .
            file: ./docker/checker.Dockerfile
            image: artluz/eng-conference-checker

          - name: mongo-backup
            context: .
            file: ./docker/backup.Dockerfile
            image: artluz/eng-conference-mongo-backup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: artluz
          password: ${{ secrets.DOCKERHUB_TOKEN_ARTLUZ }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
